
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZX STORE - Update 2.3 Fixed</title>
    <style>
        body { background-color: #000; color: white; opacity: 0; transition: opacity 0.5s ease-in; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Space+Grotesk:wght@300;500;700;800&family=Plus+Jakarta+Sans:wght@400;700;800&family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        
        :root {
            --accent-primary: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.4);
            --bg-dark: #000000;
            --glass-v3: rgba(255, 255, 255, 0.03);
            --border-v3: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        body.light-mode {
            --bg-dark: #f8fafc;
            --glass-v3: rgba(255, 255, 255, 0.4);
            --border-v3: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a;
            --text-muted: rgba(15, 23, 42, 0.5);
            --accent-primary: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.95)),
                url('https://img2.pixhost.to/images/7816/724906139_alip-1778485507238.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            overflow-x: hidden;
            color: var(--text-main);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .brand-font { 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .heading-font { font-family: 'Space Grotesk', sans-serif; }

        .nav-glass {
            background: var(--glass-v3);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-bottom: 1px solid var(--border-v3);
            transition: all 0.5s ease;
        }

        .card-v3 {
            background: var(--glass-v3);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-v3);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.02);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            color: var(--text-main);
        }

        .card-v3:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }

        .btn-outline-v3 {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-outline-v3.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }

        .glass-title {
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-v3);
            border-radius: 100px;
            padding: 14px 24px 14px 50px;
            color: white;
            font-size: 13px;
            outline: none;
            backdrop-filter: blur(15px);
        }

        /* Prompt Engine Specific CSS */
        .header-font-prompt { font-family: 'Syncopate', sans-serif; }
        .glass-card-prompt {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        .cyber-btn {
            background: linear-gradient(90deg, #0ea5e9 0%, #2563eb 100%);
            color: #ffffff;
            transition: all 0.3s ease;
        }
        .loader {
            border: 2px solid rgba(14, 165, 233, 0.1);
            border-top: 2px solid #0ea5e9;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
        }

        .modal-close-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background: white;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999; 
            transition: transform 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .prompt-text-area {
            word-break: break-word;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            min-height: 100px;
        }
    </style>
</head>
<body id="main-body" class="pb-24">

    <!-- Overlay Pemuatan -->
    <div id="loading-overlay">
        <div class="loader"></div>
        <div class="brand-font text-[10px] tracking-[0.5em] opacity-40 uppercase">Syncing Systems...</div>
    </div>

    <!-- Navigasi -->
    <nav class="fixed top-0 w-full z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between h-24 items-center">
                <div class="flex items-center gap-4 cursor-pointer" onclick="resetSearch()">
                    <div class="flex flex-col">
                        <span class="text-xl font-black tracking-tighter brand-font leading-none">HRZX<span style="opacity: 0.5; font-family: 'Space Grotesk'; letter-spacing: normal;"> STORE</span></span>
                        <span class="text-[8px] font-bold tracking-[0.4em] opacity-40 uppercase">v2.3 stable</span>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="openPromptEngine()" class="hidden md:flex px-5 py-2.5 rounded-xl bg-sky-500/10 border border-sky-500/30 text-sky-400 text-[9px] font-black tracking-widest uppercase hover:bg-sky-500/20 transition-all">
                        <i class="fa-solid fa-bolt mr-1"></i> PROMPT ENGINE
                    </button>
                    
                    <a href="https://wa.me/qr/SV2TNB7Y6HSUJ1" target="_blank" class="px-5 py-2.5 rounded-xl bg-white/5 border border-white/10 text-white text-[9px] font-black tracking-widest uppercase hover:bg-white/10 transition-all flex items-center gap-2">
                        <i class="fa-brands fa-whatsapp text-green-500"></i> CONTACT
                    </a>

                    <div onclick="toggleTheme()" class="w-10 h-10 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer bg-white/5">
                        <i id="theme-icon" class="fa-solid fa-moon"></i>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="pt-56 pb-24 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-7xl md:text-9xl font-black mb-4 leading-none tracking-tighter uppercase brand-font glass-title">HRZX</h1>
            <p class="text-[11px] font-bold uppercase tracking-[0.9em] opacity-30 mb-10">Update daily • Public Vault</p>
            
            <div class="relative max-w-lg mx-auto mb-12">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 opacity-30 text-sm"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Cari prompt..." onkeyup="handleSearch()">
            </div>

            <button onclick="openPromptEngine()" class="md:hidden mb-8 w-full py-4 rounded-2xl bg-sky-500/10 border border-sky-500/30 text-sky-400 text-[10px] font-black tracking-widest uppercase">
                <i class="fa-solid fa-bolt mr-2"></i> OPEN PROMPT ENGINE
            </button>

            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="filterCategory('all')" id="btn-all" class="btn-outline-v3 active px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Semua</button>
                <button onclick="filterCategory('girl')" id="btn-girl" class="btn-outline-v3 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Girl</button>
                <button onclick="filterCategory('boy')" id="btn-boy" class="btn-outline-v3 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Boy</button>
                <button onclick="filterCategory('couple')" id="btn-couple" class="btn-outline-v3 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Couple</button>
            </div>
        </div>
    </header>

    <!-- Grid Utama -->
    <main class="max-w-7xl mx-auto px-6">
        <div id="prompt-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"></div>
        <div id="empty-state" class="hidden text-center py-40 opacity-40 font-bold tracking-[0.3em] uppercase italic">Tiada Data</div>
    </main>

    <!-- Modal System -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/95 z-[70] hidden items-center justify-center p-4 backdrop-blur-2xl transition-all duration-500 overflow-y-auto">
        <button onclick="closeModal()" class="modal-close-btn hover:scale-110">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        <div id="modal-container" class="card-v3 rounded-[3rem] max-w-6xl w-full relative border border-white/20 shadow-2xl my-8">
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, title: "Potret Wanita Tradisional (Ultra-Realistic)", category: "AI PHOTOGRAPHY", tag: "girl", image: "https://img2.pixhost.to/images/7795/724578462_alip-1778408046225.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a woman\nANGLE: eye level handheld shot\nOUTFIT: traditional Malay batik kebaya with intricate floral patterns, silk material\nPOSE: standing gracefully with a soft smile, hands folded in front\nENVIRONMENT: traditional wooden kampung house background, warm sunlight filtering through trees\nLIGHTING: golden hour natural lighting, cinematic soft shadows, 8k resolution, photorealistic", description: "Dioptimumkan untuk Gemini AI. Fokus kepada butiran fabrik batik." },
            { id: 2, title: "Urban Girl Hoodie (Black & White)", category: "B&W CINEMATIC", tag: "girl", image: "https://img2.pixhost.to/images/7796/724601647_alip-1778413376881.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a girl\nANGLE: Handheld eye-level\nOUTFIT: oversized street hoodie, baggy pants, sneakers\nPOSE: leaning against a graffiti wall, looking away from camera\nENVIRONMENT: urban alleyway, gritty atmosphere, wet pavement\nLIGHTING: high contrast black and white, dramatic street lamp lighting, grainy film texture", description: "Estetika hitam putih 'grainy' dioptimumkan untuk ChatGPT." },
            { id: 3, title: "Night City Girl (B&W Snapshot)", category: "STREET PHOTOGRAPHY", tag: "girl", image: "https://img2.pixhost.to/images/7807/724765485_alip-1778450554419.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a girl\nANGLE: Eye level\nOUTFIT: casual leather jacket, slim fit jeans\nPOSE: walking across a busy city street at night\nENVIRONMENT: Tokyo Shinjuku neon signs background, motion blur of cars\nLIGHTING: noir aesthetic, neon light reflections on skin, sharp focus on subject", description: "Candid malam jalanan dengan simulasi optik telefon pintar." },
            { id: 4, title: "Mirror Selfie Rock Sign (Ultra-Realistic)", category: "LIFESTYLE AI", tag: "boy", image: "https://img2.pixhost.to/images/7817/724916580_alip-1778488195811.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a man\nANGLE: mirror selfie smartphone angle\nOUTFIT: vintage band t-shirt, messy hairstyle, silver chain necklace\nPOSE: holding phone with one hand, showing rock sign with the other hand\nENVIRONMENT: modern minimalist bedroom mirror, warm indoor lighting\nLIGHTING: realistic phone flash reflection on mirror, slightly warm color grading", description: "Gaya selfie cermin yang sangat kasual dan realistik." },
            { id: 5, title: "Night City Couple Selfie", category: "COUPLE LIFESTYLE", tag: "couple", image: "https://img2.pixhost.to/images/7826/725062107_alip-1778520218723.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a man and a woman\nANGLE: wide angle selfie handheld\nOUTFIT: matching casual outfits, winter coats\nPOSE: hugging close, man holding the camera, both smiling at lens\nENVIRONMENT: Kuala Lumpur city skyline with KLCC Twin Towers lit up behind them\nLIGHTING: ambient city night lights, soft bokeh background, high dynamic range", description: "Selfie pasangan di bandar waktu malam." }
        ];

        let currentCategory = 'all';

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            filterCategory(currentCategory, query);
        }

        function filterCategory(category, query = '') {
            currentCategory = category;
            const grid = document.getElementById('prompt-grid');
            const empty = document.getElementById('empty-state');
            
            document.querySelectorAll('.btn-outline-v3').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${category}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            let filtered = category === 'all' ? [...products] : products.filter(p => p.tag === category);
            if (query) filtered = filtered.filter(p => p.title.toLowerCase().includes(query) || p.description.toLowerCase().includes(query));

            filtered.reverse();
            if (filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); renderGrid(filtered); }
        }

        function renderGrid(items) {
            const grid = document.getElementById('prompt-grid');
            grid.innerHTML = items.map(p => `
                <div class="card-v3 rounded-[2.5rem] group cursor-pointer" onclick="openModal(${p.id})">
                    <div class="h-48 md:h-80 overflow-hidden relative">
                        <img src="${p.image}" class="w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                        <div class="absolute top-4 left-4 bg-white/10 backdrop-blur-md border border-white/10 px-3 py-1 rounded-full text-[8px] font-bold uppercase tracking-widest">${p.tag}</div>
                    </div>
                    <div class="p-6 md:p-10 -mt-4 relative z-10">
                        <span class="text-[8px] font-bold uppercase tracking-[0.2em] mb-2 block opacity-30">${p.category}</span>
                        <h3 class="font-bold text-sm md:text-xl mb-6 leading-tight line-clamp-2 heading-font">${p.title}</h3>
                        <div class="flex justify-between items-center pt-6 border-t border-white/5 opacity-40">
                            <span class="text-[7px] font-bold">ARC_${p.id.toString().padStart(3, '0')}</span>
                            <i class="fa-solid fa-arrow-right text-[10px]"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col lg:flex-row h-full max-h-[90vh]">
                    <div class="lg:w-1/2 p-4 md:p-8 bg-black/20">
                        <!-- FIXED IMAGE CONTAINER -->
                        <div class="relative rounded-[2.5rem] overflow-hidden border border-white/10 h-[300px] lg:h-[600px] flex items-center justify-center">
                            <img src="${p.image}" class="max-w-full max-h-full object-contain">
                        </div>
                    </div>
                    <div class="lg:w-1/2 p-8 md:p-16 flex flex-col overflow-y-auto">
                        <h2 class="text-3xl md:text-5xl font-black mb-6 heading-font leading-tight">${p.title}</h2>
                        <p class="opacity-50 mb-8 leading-relaxed font-medium text-sm md:text-base">${p.description}</p>
                        <div class="p-6 md:p-8 bg-white/5 rounded-[2rem] border border-white/10 backdrop-blur-xl">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-black opacity-30 uppercase tracking-widest">Source Prompt</span>
                                <button onclick="copyToClipboard('${p.promptText.replace(/\n/g, '\\n')}', this)" class="bg-white text-black px-6 py-2 rounded-xl text-[9px] font-bold uppercase hover:scale-105 transition-transform">Salin</button>
                            </div>
                            <div class="prompt-text-area text-[12px] font-mono opacity-80 leading-relaxed">${p.promptText}</div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        function openPromptEngine() {
            document.getElementById('modal-content').innerHTML = `
                <div class="p-8 md:p-16 min-h-[80vh] flex flex-col items-center justify-center space-y-12 bg-[#02040a] rounded-[3rem]">
                    <div class="text-center space-y-4">
                        <h1 class="header-font-prompt text-3xl md:text-5xl font-bold tracking-[0.3em] text-sky-400">HRZX PROMPT</h1>
                        <p class="text-slate-400 text-[10px] uppercase tracking-[0.4em]">Engine: OpenRouter Free / Vision</p>
                    </div>
                    <div class="glass-card-prompt rounded-[2.5rem] p-8 md:p-10 w-full max-w-2xl space-y-8 border border-sky-500/20">
                        <div onclick="document.getElementById('fileInput').click()" class="relative border-2 border-dashed border-slate-800 rounded-2xl p-10 text-center cursor-pointer hover:border-sky-500/50 bg-slate-900/20 transition-all">
                            <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileSelect(event)">
                            <div id="emptyState">
                                <i class="fa-solid fa-bolt text-yellow-400/50 text-4xl mb-6"></i>
                                <p class="text-[11px] text-slate-400 font-black uppercase tracking-[0.2em]">Muat Naik Gambar Untuk Analisis</p>
                            </div>
                            <div id="previewState" class="hidden">
                                <img id="imgDisplay" src="#" class="mx-auto rounded-xl max-h-64 shadow-2xl border border-sky-500/30">
                                <p class="mt-6 text-[10px] text-sky-400 font-bold uppercase tracking-widest">Klik Untuk Tukar Gambar</p>
                            </div>
                        </div>
                        <button id="actionBtn" disabled onclick="runEngine()" class="cyber-btn w-full py-6 rounded-2xl font-black text-[11px] tracking-[0.4em] uppercase disabled:opacity-20 shadow-lg shadow-sky-500/20">
                            PROSES DENGAN OPENROUTER/FREE
                        </button>
                        <div id="loadingIndicator" class="hidden flex flex-col items-center justify-center gap-6 py-8">
                            <div class="loader"></div>
                            <span class="text-[10px] font-black tracking-[0.3em] text-sky-400 uppercase">Menghubungi OpenRouter Engine...</span>
                        </div>
                        <div id="resultBox" class="hidden space-y-6">
                            <div class="flex items-center justify-between border-b border-sky-500/20 pb-4">
                                <span class="text-[10px] font-black text-sky-400 uppercase tracking-[0.3em]">Prompt Terhasil</span>
                                <button onclick="copyEngineResult()" id="copyEngineBtn" class="bg-sky-500/10 text-sky-400 px-5 py-2 rounded-xl border border-sky-500/30 text-[9px] font-black uppercase">Salin</button>
                            </div>
                            <div id="promptContent" class="prompt-text-area bg-[#020617] p-8 rounded-2xl text-xs md:text-sm text-slate-200 leading-relaxed border border-sky-500/10 font-mono overflow-y-auto max-h-[300px]"></div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        let base64Image = "";
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    base64Image = ev.target.result;
                    document.getElementById('imgDisplay').src = ev.target.result;
                    document.getElementById('emptyState').classList.add('hidden');
                    document.getElementById('previewState').classList.remove('hidden');
                    document.getElementById('actionBtn').disabled = false;
                    document.getElementById('resultBox').classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        async function runEngine() {
            const apiKey = "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";
            const btn = document.getElementById('actionBtn');
            const loader = document.getElementById('loadingIndicator');
            const resultBox = document.getElementById('resultBox');

            btn.classList.add('hidden');
            loader.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "openrouter/free",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "Analyze the image and strictly generate this format: Make a Picture Ultrarealistic - SUBJECT: [a man/a girl only], ANGLE: [Smartphone angle], OUTFIT: [Detailed outfit], POSE: [Body position], ENVIRONMENT: [Location], LIGHTING: [iPhone lighting]. Important: Use English only. No conversational text." },
                                { type: "image_url", image_url: { url: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                let content = data.choices[0].message.content;
                content = content.replace(/<think>[\s\S]*?<\/think>/g, '').trim();

                document.getElementById('promptContent').textContent = content;
                loader.classList.add('hidden');
                resultBox.classList.remove('hidden');
                btn.classList.remove('hidden');
            } catch (err) {
                alert("Engine Error: " + err.message);
                loader.classList.add('hidden');
                btn.classList.remove('hidden');
            }
        }

        function copyEngineResult() {
            const text = document.getElementById('promptContent').textContent;
            navigator.clipboard.writeText(text);
            const btn = document.getElementById('copyEngineBtn');
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = 'Salin', 2000);
        }

        function copyToClipboard(text, btn) {
            const decodedText = text.replace(/\\n/g, '\n');
            navigator.clipboard.writeText(decodedText);
            const oldText = btn.innerText;
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = oldText, 2000);
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        function resetSearch() {
            document.getElementById('search-input').value = '';
            filterCategory('all');
        }

        document.addEventListener('DOMContentLoaded', () => {
            filterCategory('all');
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
