        // Mulakan pengesahan dan pengambilan data jika Firebase dikonfigurasikan dengan betul
        if (isFirebaseAvailable && auth) {
            const initAuth = async () => {
                try {
                    if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                        await signInWithCustomToken(auth, window.__initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (e) {
                    console.error("Gagal melakukan pengesahan Firebase:", e);
                    loadLocalProducts();
                }
            };
            
            initAuth();

            onAuthStateChanged(auth, (u) => {
                user = u;
                if (u) {
                    fetchProducts();
                } else {
                    loadLocalProducts();
                }
            });
        } else {
            loadLocalProducts();
        }

        // Pengambilan data produk tempatan sebagai sandaran
        function loadLocalProducts() {
            const savedLocal = localStorage.getItem('hrzx_local_products');
            if (savedLocal) {
                products = JSON.parse(savedLocal);
            } else {
                products = [...defaultProducts];
                localStorage.setItem('hrzx_local_products', JSON.stringify(products));
            }
            filterCategory(currentCategory);
        }

        // Pengambilan data produk daripada Firestore
        async function fetchProducts() {
            if (!isFirebaseAvailable || !user) {
                loadLocalProducts();
                return;
            }
            showLoading(true);
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'products'));
                let dbProducts = [];
                querySnapshot.forEach((doc) => {
                    dbProducts.push({ dbId: doc.id, ...doc.data() });
                });

                if (dbProducts.length === 0) {
                    for (const p of defaultProducts) {
                        const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), p);
                        dbProducts.push({ dbId: docRef.id, ...p });
                    }
                }
                
                dbProducts.sort((a, b) => a.id - b.id);
                products = dbProducts;
                filterCategory(currentCategory);
            } catch (err) {
                console.error("Ralat memuatkan Firestore, beralih ke mod tempatan:", err);
                loadLocalProducts();
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            const loader = document.getElementById('loading-overlay');
            if (loader) {
                loader.style.display = show ? 'flex' : 'none';
            }
        }

            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('light-mode');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            filterCategory(currentCategory, query);
        }

        function filterCategory(category, query = '') {
            currentCategory = category;
            const grid = document.getElementById('prompt-grid');
            const empty = document.getElementById('empty-state');
            
            document.querySelectorAll('.btn-outline-v3').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${category}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            let filtered = category === 'all' ? [...products] : products.filter(p => p.tag === category);
            if (query) {
                filtered = filtered.filter(p => 
                    p.title.toLowerCase().includes(query) || 
                    p.description.toLowerCase().includes(query) ||
                    p.category.toLowerCase().includes(query)
                );
            }

            filtered.reverse();
            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                renderGrid(filtered);
            }
        }

        function renderGrid(items) {
            const grid = document.getElementById('prompt-grid');
            grid.innerHTML = items.map(p => `
                <div class="card-v3 rounded-[2.5rem] group cursor-pointer" onclick="openModal(${p.id})">
                    <div class="h-48 md:h-80 overflow-hidden relative">
                        <img src="${p.image}" class="w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                        <div class="absolute top-4 left-4 bg-white/10 backdrop-blur-md border border-white/10 px-3 py-1 rounded-full text-[8px] font-bold uppercase tracking-widest">${p.tag}</div>
                    </div>
                    <div class="p-6 md:p-10 -mt-4 relative z-10">
                        <span class="text-[8px] font-bold uppercase tracking-[0.2em] mb-2 block opacity-30">${p.category}</span>
                        <h3 class="font-bold text-sm md:text-xl mb-6 leading-tight line-clamp-2 heading-font">${p.title}</h3>
                        <div class="flex justify-between items-center pt-6 border-t border-white/5 opacity-40">
                            <span class="text-[7px] font-bold">ARC_${p.id.toString().padStart(3, '0')}</span>
                            <i class="fa-solid fa-arrow-right text-[10px]"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-content').innerHTML = `
                <div class="card-v3 rounded-[3rem] max-w-6xl w-full relative border border-white/20 shadow-2xl">
                    <div class="flex flex-col lg:flex-row h-full max-h-[90vh]">
                        <div class="lg:w-1/2 p-4 md:p-8 bg-black/20">
                            <div class="relative rounded-[2.5rem] overflow-hidden border border-white/10 h-[300px] lg:h-[600px] flex items-center justify-center">
                                <img src="${p.image}" class="max-w-full max-h-full object-contain">
                            </div>
                        </div>
                        <div class="lg:w-1/2 p-8 md:p-16 flex flex-col overflow-y-auto">
                            <h2 class="text-3xl md:text-5xl font-black mb-6 heading-font leading-tight">${p.title}</h2>
                            <p class="opacity-50 mb-8 leading-relaxed font-medium text-sm md:text-base">${p.description}</p>
                            <div class="p-6 md:p-8 bg-white/5 rounded-[2rem] border border-white/10 backdrop-blur-xl">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[9px] font-black opacity-30 uppercase tracking-widest">Source Prompt</span>
                                    <button onclick="copyToClipboard('${p.promptText.replace(/\n/g, '\\n')}', this)" class="bg-white text-black px-6 py-2 rounded-xl text-[9px] font-bold uppercase hover:scale-105 transition-transform">Salin</button>
                                </div>
                                <div class="prompt-text-area text-[12px] font-mono opacity-80 leading-relaxed">${p.promptText}</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        // --- SISTEM PANEL PENTADBIR (ADMIN) ---
        function requestAdminAccess() {
            if (isAdminLoggedIn) {
                openAdminPanel();
                return;
            }
            openPasswordModal();
        }

        function openPasswordModal() {
            document.getElementById('modal-content').innerHTML = `
                <div class="ios-glass-container p-8 md:p-10 max-w-sm mx-auto my-12 text-center">
                    <div class="mb-8">
                        <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-white/10">
                            <i class="fa-solid fa-lock-open text-white text-xl"></i>
                        </div>
                        <h2 class="text-xl font-bold tracking-tight text-white">Laluan Pentadbir</h2>
                        <p class="text-white/40 text-[10px] uppercase tracking-wider mt-1">Masukkan kunci keselamatan</p>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="ios-input-group px-4 py-3.5">
                            <input type="password" id="adminPasswordInput" class="ios-input text-center text-lg" placeholder="••••••••" onkeyup="if(event.key === 'Enter') verifyAdminPassword()">
                        </div>
                        <div id="adminPasswordError" class="hidden text-[#ff453a] text-[10px] font-medium tracking-wide">Kata laluan tidak sah. Cuba lagi.</div>
                        <button onclick="verifyAdminPassword()" class="w-full py-3.5 ios-btn-primary">
                            Sambungkan
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
            setTimeout(() => {
                const input = document.getElementById('adminPasswordInput');
                if (input) input.focus();
            }, 100);
        }

        function verifyAdminPassword() {
            const passwordInput = document.getElementById('adminPasswordInput');
            if (!passwordInput) return;
            const password = passwordInput.value;
            if (password === "hrzxadmin2026") {
                isAdminLoggedIn = true;
                openAdminPanel();
            } else {
                const errorEl = document.getElementById('adminPasswordError');
                if (errorEl) {
                    errorEl.classList.remove('hidden');
                }
            }
        }

        function openAdminPanel(tab = 'add') {
            let tabContent = '';
            if (tab === 'add') {
                tabContent = `
                    <form id="productForm" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="ios-label ml-1">Nama / Tajuk Produk</label>
                            <div class="ios-input-group px-4 py-3">
                                <input type="text" id="prodTitle" required class="ios-input" placeholder="cth: Street Style Boy Portrait">
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1.5">
                                <label class="ios-label ml-1">Kategori (Header)</label>
                                <div class="ios-input-group px-4 py-3">
                                    <input type="text" id="prodCategory" required class="ios-input" placeholder="cth: STREET SNAPSHOT">
                                </div>
                            </div>
                            <div class="space-y-1.5">
                                <label class="ios-label ml-1">Tag Kategori (Filter)</label>
                                <div class="ios-input-group px-4 py-3">
                                    <select id="prodTag" required class="ios-select">
                                        <option value="girl" class="bg-[#1c1c1e]">Girl</option>
                                        <option value="boy" class="bg-[#1c1c1e]">Boy</option>
                                        <option value="couple" class="bg-[#1c1c1e]">Couple</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="ios-label ml-1">Pautan Imej (URL)</label>
                            <div class="ios-input-group px-4 py-3">
                                <input type="url" id="prodImage" required class="ios-input" placeholder="https://img2.pixhost.to/images/...">
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="ios-label ml-1">Deskripsi Ringkas</label>
                            <div class="ios-input-group px-4 py-3">
                                <input type="text" id="prodDesc" required class="ios-input" placeholder="cth: Potret ultra-realistik gaya jalanan...">
                            </div>
                        </div>

                        <div class="space-y-1.5">
                            <label class="ios-label ml-1">Teks Prompt Lengkap</label>
                            <div class="ios-input-group px-4 py-3">
                                <textarea id="prodPrompt" required rows="5" class="ios-input resize-none" placeholder="Make a Picture Ultrarealistic\nSUBJECT:...\nANGLE:..."></textarea>
                            </div>
                        </div>

                        <button type="submit" class="w-full py-4 ios-btn-primary mt-2">
                            Terbitkan Produk
                        </button>
                    </form>
                `;
            } else if (tab === 'manage') {
                const sortedProducts = [...products].reverse();
                tabContent = `
                    <div class="space-y-3.5 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                        ${sortedProducts.map(p => `
                            <div class="flex items-center justify-between p-3.5 ios-card">
                                <div class="flex items-center gap-3.5">
                                    <img src="${p.image}" class="w-11 h-11 object-cover rounded-lg border border-white/10">
                                    <div>
                                        <h4 class="font-semibold text-sm text-white line-clamp-1">${p.title}</h4>
                                        <span class="text-[10px] text-white/40 uppercase font-medium tracking-wide">${p.category}</span>
                                    </div>
                                </div>
                                <button onclick="deleteProduct('${p.dbId || p.id}')" class="px-4 py-2 rounded-lg text-xs font-semibold ios-btn-delete transition-all">
                                    Padam
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            document.getElementById('modal-content').innerHTML = `
                <div class="ios-glass-container p-8 md:p-10 max-w-2xl mx-auto my-4">
                    <div class="text-center mb-8">
                        <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center mx-auto mb-3 border border-white/10">
                            <i class="fa-solid fa-sliders text-white"></i>
                        </div>
                        <h2 class="text-xl font-bold tracking-tight text-white">Portal Pentadbir</h2>
                        <p class="text-white/40 text-[10px] uppercase tracking-wider mt-0.5">Urus Arkib HRZX Store</p>
                    </div>

                    <!-- iOS Tab Bar -->
                    <div class="ios-tab-bar mb-6">
                        <button onclick="openAdminPanel('add')" class="ios-tab-item ${tab === 'add' ? 'active' : ''}">Tambah Produk</button>
                        <button onclick="openAdminPanel('manage')" class="ios-tab-item ${tab === 'manage' ? 'active' : ''}">Urus & Padam</button>
                    </div>

                    ${tabContent}
                </div>
            `;

            if (tab === 'add') {
                document.getElementById('productForm').addEventListener('submit', addNewProduct);
            }
        }

        async function addNewProduct(e) {
            e.preventDefault();
            
            const nextId = products.length > 0 ? Math.max(...products.map(p => p.id)) + 1 : 1;
            const newProduct = {
                id: nextId,
                title: document.getElementById('prodTitle').value,
                category: document.getElementById('prodCategory').value.toUpperCase(),
                tag: document.getElementById('prodTag').value,
                image: document.getElementById('prodImage').value,
                promptText: document.getElementById('prodPrompt').value,
                description: document.getElementById('prodDesc').value
            };

            showLoading(true);
            try {
                if (isFirebaseAvailable && user) {
                    const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), newProduct);
                    products.push({ dbId: docRef.id, ...newProduct });
                } else {
                    newProduct.dbId = 'local_' + Date.now();
                    products.push(newProduct);
                    localStorage.setItem('hrzx_local_products', JSON.stringify(products));
                }
                closeModal();
                filterCategory('all');
            } catch (err) {
                console.error("Gagal menambah produk:", err);
            } finally {
                showLoading(false);
            }
        }

        async function deleteProduct(dbId) {
            const confirmed = window.confirm ? window.confirm("Adakah anda pasti mahu memadamkan produk ini?") : true;
            if (!confirmed) return;

            showLoading(true);
            try {
                const idStr = String(dbId);
                if (isFirebaseAvailable && user && !idStr.startsWith('local_')) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', dbId));
                    products = products.filter(p => p.dbId !== dbId);
                } else {
                    products = products.filter(p => p.dbId !== dbId && p.id != dbId);
                    localStorage.setItem('hrzx_local_products', JSON.stringify(products));
                }
                openAdminPanel('manage');
                filterCategory(currentCategory);
            } catch (err) {
                console.error("Gagal memadam produk:", err);
            } finally {
                showLoading(false);
            }
        }

        function copyToClipboard(text, btn) {
            const decodedText = text.replace(/\\n/g, '\n');
            navigator.clipboard.writeText(decodedText);
            const oldText = btn.innerText;
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = oldText, 2000);
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        function resetSearch() {
            document.getElementById('search-input').value = '';
            filterCategory('all');
        }

        // Ikat fungsi modul ke window secara global
        window.toggleTheme = toggleTheme;
        window.resetSearch = resetSearch;
        window.handleSearch = handleSearch;
        window.filterCategory = filterCategory;
        window.openModal = openModal;
        window.requestAdminAccess = requestAdminAccess;
        window.openAdminPanel = openAdminPanel;
        window.openPasswordModal = openPasswordModal;
        window.verifyAdminPassword = verifyAdminPassword;
        window.addNewProduct = addNewProduct;
        window.deleteProduct = deleteProduct;
        window.copyToClipboard = copyToClipboard;
        window.closeModal = closeModal;

        // Mulakan aplikasi sebaik sahaja DOM sedia
        document.addEventListener('DOMContentLoaded', () => {
            document.body.style.opacity = '1';
            if (!isFirebaseAvailable) {
                loadLocalProducts();
            }
        });
    </script>
</body>
</html>
