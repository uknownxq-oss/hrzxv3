<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Kontol Snapseed Style</title>

<style>
body{
    margin:0;
    background:#111;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:520px;
    margin:auto;
    background:#1a1a1a;
    padding:20px;
    border-radius:20px;
}

input[type=file]{
    width:100%;
    padding:12px;
    background:#222;
    color:white;
    border:none;
    border-radius:12px;
}

img,canvas{
    width:100%;
    margin-top:15px;
    border-radius:15px;
    background:#222;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    font-size:16px;
    cursor:pointer;
}

#enhance{
    background:#2196f3;
    color:white;
}

#download{
    background:#00c853;
    color:white;
    display:none;
}

#status{
    margin-top:10px;
    color:#bbb;
}
</style>
</head>
<body>

<div class="container">

<h2>📸 HD Gambar</h2>

<input
type="file"
id="upload"
accept="image/*">

<img id="preview" hidden>

<canvas id="canvas" hidden></canvas>

<button id="enhance">
HD-kan Gambar
</button>

<button id="download">
Download HD
</button>

<p id="status"></p>

</div>

<script>
const upload =
document.getElementById("upload");

const preview =
document.getElementById("preview");

const canvas =
document.getElementById("canvas");

const ctx =
canvas.getContext("2d");

const enhanceBtn =
document.getElementById("enhance");

const downloadBtn =
document.getElementById("download");

const statusText =
document.getElementById("status");

let uploadedImg = null;

// upload gambar
upload.addEventListener(
"change",
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(ev){

uploadedImg =
new Image();

uploadedImg.onload =
function(){

preview.src =
ev.target.result;

preview.hidden =
false;

statusText.innerText =
"Gambar berjaya upload ✅";
};

uploadedImg.src =
ev.target.result;
};

reader.readAsDataURL(file);
});

// HD button
enhanceBtn.addEventListener(
"click",
function(){

if(!uploadedImg){

alert(
"Upload gambar dulu!"
);

return;
}

statusText.innerText =
"Processing HD...";

setTimeout(() => {
processImage();
},100);

});

function processImage(){

const scale = 3;

canvas.width =
uploadedImg.width
* scale;

canvas.height =
uploadedImg.height
* scale;

canvas.hidden =
false;

// upscale
ctx.imageSmoothingEnabled =
true;

ctx.imageSmoothingQuality =
"high";

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(
uploadedImg,
0,
0,
canvas.width,
canvas.height
);

// ACCENTUATE look
ctx.filter =
"contrast(135%) saturate(120%) brightness(104%)";

ctx.drawImage(
canvas,
0,
0
);

// structure effect
applyStructure(
2.2
);

// sharpen
sharpen();

statusText.innerText =
"Siap HD ✨";

downloadBtn.style.display =
"block";
}

function applyStructure(
strength
){

const imageData =
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

const data =
imageData.data;

const copy =
new Uint8ClampedArray(
data
);

for(
let y=1;
y<canvas.height-1;
y++
){

for(
let x=1;
x<canvas.width-1;
x++
){

const i =
(y*canvas.width+x)
*4;

let avgR=0;
let avgG=0;
let avgB=0;

for(
let ky=-1;
ky<=1;
ky++
){

for(
let kx=-1;
kx<=1;
kx++
){

const ni =
(
(y+ky)
*canvas.width
+
(x+kx)
)*4;

avgR +=
copy[ni];

avgG +=
copy[ni+1];

avgB +=
copy[ni+2];
}
}

avgR /= 9;
avgG /= 9;
avgB /= 9;

data[i] +=
(
copy[i]-avgR
)*strength;

data[i+1] +=
(
copy[i+1]-avgG
)*strength;

data[i+2] +=
(
copy[i+2]-avgB
)*strength;
}
}

ctx.putImageData(
imageData,
0,
0
);
}

function sharpen(){

const imageData =
ctx.getImageData(
0,
0,
canvas.width,
canvas.height
);

const d =
imageData.data;

for(
let i=0;
i<d.length;
i+=4
){

d[i] =
Math.min(
255,
d[i]*1.08
);

d[i+1] =
Math.min(
255,
d[i+1]*1.08
);

d[i+2] =
Math.min(
255,
d[i+2]*1.08
);
}

ctx.putImageData(
imageData,
0,
0
);
}

// download
downloadBtn.addEventListener(
"click",
function(){

const a =
document.createElement(
"a"
);

a.href =
canvas.toDataURL(
"image/png"
);

a.download =
"HD_Image.png";

a.click();
});
</script>

</body>
</html>
