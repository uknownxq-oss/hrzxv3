
<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRZX STORE - Update 2.3 Fixed</title>
    <style>
        body { background-color: #000; color: white; opacity: 0; transition: opacity 0.5s ease-in; }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Space+Grotesk:wght@300;500;700;800&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        
        :root {
            --accent-primary: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.4);
            --bg-dark: #000000;
            --glass-v3: rgba(255, 255, 255, 0.03);
            --border-v3: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        body.light-mode {
            --bg-dark: #f8fafc;
            --glass-v3: rgba(255, 255, 255, 0.4);
            --border-v3: rgba(0, 0, 0, 0.05);
            --text-main: #0f172a;
            --text-muted: rgba(15, 23, 42, 0.5);
            --accent-primary: #0f172a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.95)),
                url('https://img2.pixhost.to/images/7816/724906139_alip-1778485507238.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            overflow-x: hidden;
            color: var(--text-main);
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        body.light-mode {
            background-image: 
                linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(248,250,252,0.98)),
                url('https://img2.pixhost.to/images/7816/724906139_alip-1778485507238.jpg');
        }

        .brand-font { 
            font-family: 'Orbitron', sans-serif; 
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .heading-font { font-family: 'Space Grotesk', sans-serif; }

        .nav-glass {
            background: var(--glass-v3);
            backdrop-filter: blur(30px) saturate(150%);
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border-bottom: 1px solid var(--border-v3);
            transition: all 0.5s ease;
        }

        .card-v3 {
            background: var(--glass-v3);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-v3);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.02);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            color: var(--text-main);
        }

        .card-v3:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 
                0 30px 60px -12px rgba(0, 0, 0, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.05);
        }

        .btn-outline-v3 {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-outline-v3.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .glass-title {
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .search-container {
            max-width: 500px;
            margin: 40px auto 0;
            position: relative;
        }

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-v3);
            border-radius: 100px;
            padding: 14px 24px 14px 50px;
            color: white;
            font-size: 13px;
            outline: none;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            position: relative;
            border: 2px solid var(--border-v3);
        }

        .loader-ring::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--text-main);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .image-mask {
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }
    </style>
</head>
<body id="main-body" class="pb-24">

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-ring"></div>
        <div class="brand-font text-[10px] tracking-[0.5em] opacity-40">Synchronizing...</div>
    </div>

    <!-- Navigasi -->
    <nav class="fixed top-0 w-full z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between h-24 items-center">
                <div class="flex items-center gap-4 cursor-pointer" onclick="resetSearch()">
                    <div class="flex flex-col">
                        <span class="text-xl font-black tracking-tighter brand-font leading-none">HRZX<span style="opacity: 0.5; font-family: 'Space Grotesk'; letter-spacing: normal;"> STORE</span></span>
                        <span class="text-[8px] font-bold tracking-[0.4em] opacity-40 uppercase">v2.3 stable</span>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div onclick="toggleTheme()" class="w-11 h-11 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer bg-white/5">
                        <i id="theme-icon" class="fa-solid fa-moon"></i>
                    </div>
                    <a href="https://wa.me/qr/SV2TNB7Y6HSUJ1" target="_blank" class="px-6 py-3 rounded-2xl font-bold text-[10px] tracking-widest uppercase flex items-center gap-2 border border-white/10 bg-white/5">
                        <i class="fa-brands fa-whatsapp text-green-500"></i> CONTACT
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="pt-56 pb-24 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-7xl md:text-9xl font-black mb-4 leading-none tracking-tighter uppercase brand-font glass-title">HRZX</h1>
            <div class="search-container mb-12">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 opacity-30 text-sm"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Cari prompt..." onkeyup="handleSearch()">
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="filterCategory('all')" id="btn-all" class="btn-outline-v3 active px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Semua</button>
                <button onclick="filterCategory('girl')" id="btn-girl" class="btn-outline-v3 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Girl</button>
                <button onclick="filterCategory('boy')" id="btn-boy" class="btn-outline-v3 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Boy</button>
                <button onclick="filterCategory('couple')" id="btn-couple" class="btn-outline-v3 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Couple</button>
            </div>
        </div>
    </header>

    <!-- Grid Konten -->
    <main class="max-w-7xl mx-auto px-6">
        <div id="prompt-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"></div>
        <div id="empty-state" class="hidden text-center py-40 opacity-40 font-bold tracking-[0.3em] uppercase italic">
            Tiada keputusan dijumpai
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-32 text-center opacity-20">
        <p class="text-[9px] font-bold uppercase tracking-[0.6em]">&copy; 2026 HRZX Digital Archive</p>
    </footer>

    <!-- Modal -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/95 z-[70] hidden items-center justify-center p-4 backdrop-blur-2xl">
        <div class="card-v3 rounded-[3rem] max-w-6xl w-full max-h-[90vh] overflow-y-auto relative border border-white/20">
            <button onclick="closeModal()" class="fixed top-8 right-8 w-12 h-12 rounded-full bg-white text-black flex items-center justify-center z-50 hover:scale-110 transition-transform">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, title: "Potret Wanita Tradisional", category: "AI PHOTOGRAPHY", tag: "girl", image: "https://img2.pixhost.to/images/7795/724578462_alip-1778408046225.jpg", promptText: "...", description: "Potret ultra-realistic wanita dengan busana batik tradisional." },
            { id: 2, title: "Urban Girl Hoodie", category: "B&W CINEMATIC", tag: "girl", image: "https://img2.pixhost.to/images/7796/724601647_alip-1778413376881.jpg", promptText: "...", description: "Gaya jalanan urban dalam nada hitam putih klasik." },
            { id: 3, title: "Night City Girl", category: "STREET PHOTOGRAPHY", tag: "girl", image: "https://img2.pixhost.to/images/7807/724765485_alip-1778450554419.jpg", promptText: "...", description: "Candid jalanan malam dengan pencahayaan neon." },
            { id: 4, title: "Mirror Selfie Rock Sign", category: "LIFESTYLE AI", tag: "boy", image: "https://img2.pixhost.to/images/7817/724916580_alip-1778488195811.jpg", promptText: "...", description: "Swafoto cermin yang sangat realistik dengan mood kasual." },
            { id: 5, title: "Night City Couple Selfie", category: "COUPLE LIFESTYLE", tag: "couple", image: "https://img2.pixhost.to/images/7826/725062107_alip-1778520218723.jpg", promptText: "...", description: "Momen romantik pasangan di bawah lampu jalan kota." }
        ];

        let currentCategory = 'all';

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            filterCategory(currentCategory, query);
        }

        function filterCategory(category, query = '') {
            currentCategory = category;
            const grid = document.getElementById('prompt-grid');
            const empty = document.getElementById('empty-state');
            
            document.querySelectorAll('.btn-outline-v3').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${category}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            let filtered = category === 'all' ? [...products] : products.filter(p => p.tag === category);
            if (query) {
                filtered = filtered.filter(p => p.title.toLowerCase().includes(query) || p.description.toLowerCase().includes(query));
            }

            filtered.reverse();
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                renderGrid(filtered);
            }
        }

        function renderGrid(items) {
            const grid = document.getElementById('prompt-grid');
            grid.innerHTML = items.map(p => `
                <div class="card-v3 rounded-[2.5rem] group cursor-pointer" onclick="openModal(${p.id})">
                    <div class="h-48 md:h-80 overflow-hidden relative image-mask">
                        <img src="${p.image}" alt="${p.title}" class="w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-110">
                        <div class="absolute top-4 left-4 border border-white/10 bg-black/20 backdrop-blur-md px-3 py-1 rounded-full text-[8px] font-bold uppercase tracking-widest">${p.tag}</div>
                    </div>
                    <div class="p-6 md:p-10 -mt-4 relative z-10">
                        <span class="text-[8px] font-bold uppercase tracking-[0.2em] mb-2 block opacity-30">${p.category}</span>
                        <h3 class="font-bold text-sm md:text-xl mb-4 leading-tight heading-font">${p.title}</h3>
                        <div class="flex justify-between items-center pt-4 border-t border-white/5 opacity-40">
                            <span class="text-[7px] font-bold uppercase">ARC_${p.id.toString().padStart(3, '0')}</span>
                            <i class="fa-solid fa-chevron-right text-[10px]"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col lg:flex-row">
                    <div class="lg:w-1/2 p-6">
                        <img src="${p.image}" class="w-full rounded-[2rem] shadow-2xl">
                    </div>
                    <div class="lg:w-1/2 p-10 flex flex-col justify-center">
                        <span class="text-[10px] font-bold uppercase tracking-[0.4em] opacity-40 mb-4">${p.category}</span>
                        <h2 class="text-4xl font-black mb-6 heading-font">${p.title}</h2>
                        <p class="opacity-60 mb-8 leading-relaxed">${p.description}</p>
                        <div class="p-6 bg-white/5 rounded-2xl border border-white/10 mb-8">
                            <button onclick="copyPrompt('${p.promptText}')" id="copy-btn" class="w-full py-4 bg-white text-black font-bold rounded-xl text-[10px] uppercase tracking-widest">Salin Prompt</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        function copyPrompt(text) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const btn = document.getElementById('copy-btn');
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = 'Salin Prompt', 2000);
        }

        function resetSearch() {
            document.getElementById('search-input').value = '';
            filterCategory('all');
        }

        document.addEventListener('DOMContentLoaded', () => {
            filterCategory('all');
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
