<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HRZX STORE v3</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Space+Grotesk:wght@300;500;700;800&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');

:root{
    --bg:#000;
    --card:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.08);
    --text:#fff;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    background:#000;
    color:white;
    overflow-x:hidden;

    background-image:
    linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
    url('https://img2.pixhost.to/images/7816/724906139_alip-1778485507238.jpg');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.brand-font{
    font-family:'Orbitron',sans-serif;
}

.glass{
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);
}

.card{
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.08);

    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.search{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    outline:none;
}

textarea{
    resize:none;
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,0.1);
    border-radius:20px;
}

</style>
</head>

<body class="pb-32">

<!-- NAVBAR -->

<nav class="fixed top-0 left-0 w-full z-50 glass">

<div class="max-w-7xl mx-auto px-6">

<div class="h-24 flex items-center justify-between">

<div
onclick="secretAdmin()"
class="cursor-pointer">

<h1 class="brand-font text-3xl font-black">
HRZX STORE
</h1>

<p class="text-[10px] tracking-[0.4em] opacity-40 uppercase">
v3 archive
</p>

</div>

<a
href="https://wa.me/qr/SV2TNB7Y6HSUJ1"
target="_blank"
class="px-6 py-3 rounded-2xl glass text-xs font-bold">

CONTACT

</a>

</div>

</div>

</nav>

<!-- HERO -->

<section class="pt-52 pb-24 text-center px-6">

<h1 class="text-7xl md:text-9xl font-black brand-font mb-6">
HRZX
</h1>

<p class="uppercase tracking-[0.6em] text-xs opacity-30 mb-12">
Digital Prompt Archive
</p>

<div class="max-w-xl mx-auto relative">

<i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 opacity-30"></i>

<input
id="search-input"
onkeyup="handleSearch()"
type="text"
placeholder="Search Prompt..."
class="search w-full rounded-full py-4 pl-14 pr-6">

</div>

<div class="flex justify-center flex-wrap gap-4 mt-10">

<button onclick="filterCategory('all')" id="btn-all" class="category-btn px-8 py-3 rounded-2xl glass text-xs font-bold">
ALL
</button>

<button onclick="filterCategory('girl')" id="btn-girl" class="category-btn px-8 py-3 rounded-2xl glass text-xs font-bold">
GIRL
</button>

<button onclick="filterCategory('boy')" id="btn-boy" class="category-btn px-8 py-3 rounded-2xl glass text-xs font-bold">
BOY
</button>

<button onclick="filterCategory('couple')" id="btn-couple" class="category-btn px-8 py-3 rounded-2xl glass text-xs font-bold">
COUPLE
</button>

</div>

</section>

<!-- GRID -->

<main class="max-w-7xl mx-auto px-6">

<div
id="prompt-grid"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
</div>

</main>

<!-- MODAL -->

<div
id="modal-overlay"
class="hidden fixed inset-0 bg-black/90 z-[100] backdrop-blur-xl items-center justify-center p-6">

<div class="glass rounded-[2rem] max-w-6xl w-full overflow-hidden relative">

<button
onclick="closeModal()"
class="absolute top-6 right-6 z-50 w-12 h-12 rounded-full bg-white text-black">

<i class="fa-solid fa-xmark"></i>

</button>

<div id="modal-content"></div>

</div>

</div>

<!-- ADMIN PANEL -->

<div
id="admin-panel"
class="hidden fixed bottom-6 right-6 z-[200] w-[380px] glass rounded-[2rem] p-6">

<h2 class="text-xl font-black mb-6">
ADMIN PANEL
</h2>

<input
id="upload-title"
placeholder="Title"
class="w-full mb-3 p-4 rounded-xl bg-black border border-white/10">

<input
id="upload-category"
placeholder="Category"
class="w-full mb-3 p-4 rounded-xl bg-black border border-white/10">

<select
id="upload-tag"
class="w-full mb-3 p-4 rounded-xl bg-black border border-white/10">

<option value="girl">Girl</option>
<option value="boy">Boy</option>
<option value="couple">Couple</option>

</select>

<textarea
id="upload-description"
placeholder="Description"
class="w-full h-28 mb-3 p-4 rounded-xl bg-black border border-white/10"></textarea>

<textarea
id="upload-prompt"
placeholder="Prompt"
class="w-full h-40 mb-3 p-4 rounded-xl bg-black border border-white/10"></textarea>

<input
type="file"
id="upload-image"
class="mb-4">

<button
onclick="uploadProduct()"
class="w-full bg-white text-black py-4 rounded-xl font-black">

UPLOAD PRODUCT

</button>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getStorage,
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";


// ======================
// FIREBASE CONFIG
// ======================

const firebaseConfig = {

apiKey: "PASTE_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

projectId: "YOUR_PROJECT_ID",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "XXXX",

appId: "XXXX"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);


// ======================
// GLOBAL
// ======================

let products = [];

let currentCategory = 'all';


// ======================
// ADMIN
// ======================

function isAdmin(){

return localStorage.getItem("hrzx_admin") === "true";

}

let clickCount = 0;

window.secretAdmin = function(){

clickCount++;

if(clickCount >= 5){

const pass = prompt("ENTER ADMIN PASSWORD");

if(pass === "HRZX2026"){

localStorage.setItem("hrzx_admin","true");

alert("ADMIN MODE ACTIVE");

document.getElementById('admin-panel').classList.remove('hidden');

}else{

alert("WRONG PASSWORD");

}

clickCount = 0;

}

}


// ======================
// LOAD PRODUCTS
// ======================

async function loadProducts(){

const querySnapshot = await getDocs(collection(db,"products"));

products = [];

querySnapshot.forEach((docSnap)=>{

products.push({
firebaseId:docSnap.id,
...docSnap.data()
});

});

renderGrid(products.reverse());

}

window.onload = ()=>{

loadProducts();

if(isAdmin()){

document.getElementById('admin-panel').classList.remove('hidden');

}

}


// ======================
// SEARCH
// ======================

window.handleSearch = function(){

const query = document.getElementById('search-input').value.toLowerCase();

filterCategory(currentCategory, query);

}


// ======================
// FILTER
// ======================

window.filterCategory = function(category, query=''){

currentCategory = category;

let filtered = category === 'all'
? [...products]
: products.filter(p=>p.tag===category);

if(query){

filtered = filtered.filter(p=>

p.title.toLowerCase().includes(query) ||
p.description.toLowerCase().includes(query)

);

}

renderGrid(filtered.reverse());

}


// ======================
// RENDER
// ======================

function renderGrid(items){

const grid = document.getElementById('prompt-grid');

grid.innerHTML = items.map(p=>`

<div class="card rounded-[2rem] overflow-hidden">

<div onclick="openModal('${p.firebaseId}')" class="cursor-pointer">

<div class="h-72 overflow-hidden">

<img
src="${p.image}"
class="w-full h-full object-cover hover:scale-110 duration-700">

</div>

<div class="p-6">

<div class="flex justify-between items-center mb-4">

<span class="text-[10px] uppercase opacity-40">
${p.category}
</span>

<span class="text-[10px] uppercase glass px-3 py-1 rounded-full">
${p.tag}
</span>

</div>

<h2 class="text-2xl font-black leading-tight">
${p.title}
</h2>

</div>

</div>

${isAdmin() ? `

<div class="px-6 pb-6">

<button
onclick="deleteProduct('${p.firebaseId}')"
class="w-full bg-red-500 py-4 rounded-xl font-bold">

DELETE

</button>

</div>

` : ''}

</div>

`).join('');

}


// ======================
// OPEN MODAL
// ======================

window.openModal = function(id){

const p = products.find(x=>x.firebaseId===id);

document.getElementById('modal-content').innerHTML = `

<div class="grid lg:grid-cols-2">

<div class="p-8">

<img
src="${p.image}"
class="rounded-[2rem] w-full h-full object-cover">

</div>

<div class="p-10 flex flex-col">

<span class="opacity-40 uppercase text-xs mb-4">
${p.category}
</span>

<h2 class="text-5xl font-black mb-6">
${p.title}
</h2>

<p class="opacity-60 leading-relaxed mb-10">
${p.description}
</p>

<div class="glass rounded-[2rem] p-6 overflow-auto max-h-[400px]">

<pre class="whitespace-pre-wrap text-sm leading-relaxed">${p.promptText}</pre>

</div>

<button
onclick="copyPrompt()"
class="mt-6 bg-white text-black py-4 rounded-2xl font-black">

COPY PROMPT

</button>

</div>

</div>

`;

document.getElementById('modal-overlay').classList.remove('hidden');

document.getElementById('modal-overlay').classList.add('flex');

}


// ======================
// CLOSE MODAL
// ======================

window.closeModal = function(){

document.getElementById('modal-overlay').classList.add('hidden');

document.getElementById('modal-overlay').classList.remove('flex');

}


// ======================
// COPY PROMPT
// ======================

window.copyPrompt = function(){

const text = document.querySelector('pre').innerText;

navigator.clipboard.writeText(text);

alert("PROMPT COPIED");

}


// ======================
// UPLOAD PRODUCT
// ======================

window.uploadProduct = async function(){

if(!isAdmin()){

alert("ADMIN ONLY");

return;

}

const title = document.getElementById('upload-title').value;

const category = document.getElementById('upload-category').value;

const tag = document.getElementById('upload-tag').value;

const description = document.getElementById('upload-description').value;

const promptText = document.getElementById('upload-prompt').value;

const file = document.getElementById('upload-image').files[0];

if(!file){

alert("SELECT IMAGE");

return;

}

const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);

await uploadBytes(storageRef, file);

const imageUrl = await getDownloadURL(storageRef);

await addDoc(collection(db,"products"),{

title,
category,
tag,
description,
promptText,
image:imageUrl,
createdAt:Date.now()

});

alert("PRODUCT UPLOADED");

location.reload();

}


// ======================
// DELETE
// ======================

window.deleteProduct = async function(id){

if(confirm("DELETE PRODUCT?")){

await deleteDoc(doc(db,"products",id));

location.reload();

}

}

</script>

</body>
</html>
