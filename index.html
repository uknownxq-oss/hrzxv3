        .card-v3 {
            background: var(--glass-v3);

            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border-v3);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.02);

            overflow: hidden;
            color: var(--text-main);

        .card-v3:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }

        .btn-outline-v3 {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);

            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);

        .search-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-v3);
            border-radius: 100px;
            padding: 14px 24px 14px 50px;
            color: white;
            font-size: 13px;
            outline: none;
            backdrop-filter: blur(15px);
        }
        
        #loading-overlay {
            position: fixed;
            inset: 0;

            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;

            border: 2px solid rgba(255, 255, 255, 0.1);

            width: 24px;
            height: 24px;

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .modal-close-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;

            height: 3.5rem;
            border-radius: 50%;
            background: white;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;

            padding: 12px 16px;
            color: white;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .admin-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body id="main-body" class="pb-24">

    <!-- Overlay Pemuatan -->
    <div id="loading-overlay">
        <div class="loader"></div>
        <div class="brand-font text-[10px] tracking-[0.5em] opacity-40 uppercase">Syncing Systems...</div>

    <!-- Navigasi -->
    <nav class="fixed top-0 w-full z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-6">

                    <div class="flex flex-col">

                        <div class="flex items-center">
                            <span class="text-[8px] font-bold tracking-[0.4em] opacity-40 uppercase">v2.3 stable</span>

                <div class="flex items-center gap-3">

                        <i class="fa-brands fa-whatsapp text-green-500"></i> CONTACT
                    </a>

                    <div onclick="toggleTheme()" class="w-10 h-10 border border-white/10 rounded-xl flex items-center justify-center cursor-pointer bg-white/5">

                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="pt-56 pb-24 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-white/10 bg-white/5 backdrop-blur-md opacity-60 text-[9px] font-bold uppercase tracking-[0.3em] mb-10">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Systems Operational
            </div>
            <h1 class="text-7xl md:text-9xl font-black mb-4 leading-none tracking-tighter uppercase brand-font glass-title">HRZX</h1>
            <p class="text-[11px] font-bold uppercase tracking-[0.9em] opacity-30 mb-10">Update daily • Public Vault</p>
            
            <div class="relative max-w-lg mx-auto mb-12">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 opacity-30 text-sm"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Cari prompt..." onkeyup="handleSearch()">
            </div>

            <div class="flex flex-wrap justify-center gap-3">
                <button onclick="filterCategory('all')" id="btn-all" class="btn-outline-v3 active px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Semua</button>
                <button onclick="filterCategory('girl')" id="btn-girl" class="btn-outline-v3 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Girl</button>
                <button onclick="filterCategory('boy')" id="btn-boy" class="btn-outline-v3 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Boy</button>
                <button onclick="filterCategory('couple')" id="btn-couple" class="btn-outline-v3 px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">Couple</button>
            </div>
        </div>
    </header>

    <!-- Grid Utama -->
    <main class="max-w-7xl mx-auto px-6">
        <div id="prompt-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8"></div>
        <div id="empty-state" class="hidden text-center py-40 opacity-40 font-bold tracking-[0.3em] uppercase italic">Tiada Data</div>
    </main>

    <!-- Modal System -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/95 z-[70] hidden items-center justify-center p-4 backdrop-blur-2xl transition-all duration-500 overflow-y-auto">
        <button onclick="closeModal()" class="modal-close-btn hover:scale-110">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        <div id="modal-container" class="card-v3 rounded-[3rem] max-w-6xl w-full relative border border-white/20 shadow-2xl my-8">
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // Data Products Asal (Disimpan dalam array boleh mutasi)
        let products = [
            { id: 1, title: "Potret Wanita Tradisional (Ultra-Realistic)", category: "AI PHOTOGRAPHY", tag: "girl", image: "https://img2.pixhost.to/images/7795/724578462_alip-1778408046225.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a woman\nANGLE: eye level handheld shot\nOUTFIT: traditional Malay batik kebaya with intricate floral patterns, silk material\nPOSE: standing gracefully with a soft smile, hands folded in front\nENVIRONMENT: traditional wooden kampung house background, warm sunlight filtering through trees\nLIGHTING: golden hour natural lighting, cinematic soft shadows, 8k resolution, photorealistic", description: "Dioptimumkan untuk Gemini AI. Fokus kepada butiran fabrik batik." },
            { id: 2, title: "Urban Girl Hoodie (Black & White)", category: "B&W CINEMATIC", tag: "girl", image: "https://img2.pixhost.to/images/7796/724601647_alip-1778413376881.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a girl\nANGLE: Handheld eye-level\nOUTFIT: oversized street hoodie, baggy pants, sneakers\nPOSE: leaning against a graffiti wall, looking away from camera\nENVIRONMENT: urban alleyway, gritty atmosphere, wet pavement\nLIGHTING: high contrast black and white, dramatic street lamp lighting, grainy film texture", description: "Estetika hitam putih 'grainy' dioptimumkan untuk ChatGPT." },
            { id: 3, title: "Night City Girl (B&W Snapshot)", category: "STREET PHOTOGRAPHY", tag: "girl", image: "https://img2.pixhost.to/images/7807/724765485_alip-1778450554419.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a girl\nANGLE: Eye level\nOUTFIT: casual leather jacket, slim fit jeans\nPOSE: walking across a busy city street at night\nENVIRONMENT: Tokyo Shinjuku neon signs background, motion blur of cars\nLIGHTING: noir aesthetic, neon light reflections on skin, sharp focus on subject", description: "Candid malam jalanan dengan simulasi optik telefon pintar." },
            { id: 4, title: "Mirror Selfie Rock Sign (Ultra-Realistic)", category: "LIFESTYLE AI", tag: "boy", image: "https://img2.pixhost.to/images/7817/724916580_alip-1778488195811.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a man\nANGLE: mirror selfie smartphone angle\nOUTFIT: vintage band t-shirt, messy hairstyle, silver chain necklace\nPOSE: holding phone with one hand, showing rock sign with the other hand\nENVIRONMENT: modern minimalist bedroom mirror, warm indoor lighting\nLIGHTING: realistic phone flash reflection on mirror, slightly warm color grading", description: "Gaya selfie cermin yang sangat kasual dan realistik." },
            { id: 5, title: "Night City Couple Selfie", category: "COUPLE LIFESTYLE", tag: "couple", image: "https://img2.pixhost.to/images/7826/725062107_alip-1778520218723.jpg", promptText: "Make a Picture Ultrarealistic\nSUBJECT: a man and a woman\nANGLE: wide angle selfie handheld\nOUTFIT: matching casual outfits, winter coats\nPOSE: hugging close, man holding the camera, both smiling at lens\nENVIRONMENT: Kuala Lumpur city skyline with KLCC Twin Towers lit up behind them\nLIGHTING: ambient city night lights, soft bokeh background, high dynamic range", description: "Selfie pasangan di bandar waktu malam." }
        ];

        let currentCategory = 'all';
        let isAdminLoggedIn = false;

        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('light-mode');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function handleSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            filterCategory(currentCategory, query);
        }

        function filterCategory(category, query = '') {
            currentCategory = category;
            const grid = document.getElementById('prompt-grid');
            const empty = document.getElementById('empty-state');
            
            document.querySelectorAll('.btn-outline-v3').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${category}`);
            if (activeBtn) activeBtn.classList.add('active');
            
            let filtered = category === 'all' ? [...products] : products.filter(p => p.tag === category);
            if (query) filtered = filtered.filter(p => p.title.toLowerCase().includes(query) || p.description.toLowerCase().includes(query));

            filtered.reverse();
            if (filtered.length === 0) { grid.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); renderGrid(filtered); }
        }

        function renderGrid(items) {
            const grid = document.getElementById('prompt-grid');
            grid.innerHTML = items.map(p => `
                <div class="card-v3 rounded-[2.5rem] group cursor-pointer" onclick="openModal(${p.id})">
                    <div class="h-48 md:h-80 overflow-hidden relative">
                        <img src="${p.image}" class="w-full h-full object-cover transition-transform duration-[2s] group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>
                        <div class="absolute top-4 left-4 bg-white/10 backdrop-blur-md border border-white/10 px-3 py-1 rounded-full text-[8px] font-bold uppercase tracking-widest">${p.tag}</div>
                    </div>
                    <div class="p-6 md:p-10 -mt-4 relative z-10">
                        <span class="text-[8px] font-bold uppercase tracking-[0.2em] mb-2 block opacity-30">${p.category}</span>
                        <h3 class="font-bold text-sm md:text-xl mb-6 leading-tight line-clamp-2 heading-font">${p.title}</h3>
                        <div class="flex justify-between items-center pt-6 border-t border-white/5 opacity-40">
                            <span class="text-[7px] font-bold">ARC_${p.id.toString().padStart(3, '0')}</span>
                            <i class="fa-solid fa-arrow-right text-[10px]"></i>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modal-content').innerHTML = `
                <div class="flex flex-col lg:flex-row h-full max-h-[90vh]">
                    <div class="lg:w-1/2 p-4 md:p-8 bg-black/20">
                        <div class="relative rounded-[2.5rem] overflow-hidden border border-white/10 h-[300px] lg:h-[600px] flex items-center justify-center">
                            <img src="${p.image}" class="max-w-full max-h-full object-contain">
                        </div>
                    </div>
                    <div class="lg:w-1/2 p-8 md:p-16 flex flex-col overflow-y-auto">
                        <h2 class="text-3xl md:text-5xl font-black mb-6 heading-font leading-tight">${p.title}</h2>
                        <p class="opacity-50 mb-8 leading-relaxed font-medium text-sm md:text-base">${p.description}</p>
                        <div class="p-6 md:p-8 bg-white/5 rounded-[2rem] border border-white/10 backdrop-blur-xl">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-black opacity-30 uppercase tracking-widest">Source Prompt</span>
                                <button onclick="copyToClipboard('${p.promptText.replace(/\n/g, '\\n')}', this)" class="bg-white text-black px-6 py-2 rounded-xl text-[9px] font-bold uppercase hover:scale-105 transition-transform">Salin</button>
                            </div>
                            <div class="prompt-text-area text-[12px] font-mono opacity-80 leading-relaxed">${p.promptText}</div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        // --- SISTEM PANEL PENTADBIR (ADMIN) ---
        function requestAdminAccess() {
            if (isAdminLoggedIn) {
                openAdminPanel();
                return;
            }
            const password = prompt("Sila masukkan kata laluan keselamatan:");
            if (password === "hrzxadmin2026") {
                isAdminLoggedIn = true;
                openAdminPanel();
            } else if (password !== null) {
                alert("Akses ditolak! Kata laluan salah.");
            }
        }

        function openAdminPanel() {
            document.getElementById('modal-content').innerHTML = `
                <div class="p-8 md:p-12 bg-[#02040a] rounded-[3rem] max-w-2xl mx-auto my-4 border border-white/10">
                    <div class="text-center mb-8">
                        <h2 class="brand-font text-2xl md:text-3xl font-black text-amber-400">Portal Admin</h2>
                        <p class="text-slate-500 text-[9px] uppercase tracking-widest mt-1">HRZX STORE Control Room</p>
                    </div>

                    <form id="productForm" onsubmit="addNewProduct(event)" class="space-y-6">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">Nama/Tajuk Produk</label>
                            <input type="text" id="prodTitle" required class="admin-input" placeholder="cth: Street Style Boy Portrait">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">Kategori (Header)</label>
                                <input type="text" id="prodCategory" required class="admin-input" placeholder="cth: STREET SNAPSHOT">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">Tag Kategori (Filter)</label>
                                <select id="prodTag" required class="admin-input bg-[#111]">
                                    <option value="girl">Girl</option>
                                    <option value="boy">Boy</option>
                                    <option value="couple">Couple</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">Pautan Imej (URL)</label>
                            <input type="url" id="prodImage" required class="admin-input" placeholder="https://img2.pixhost.to/images/...">
                        </div>

                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">Deskripsi Ringkas</label>
                            <input type="text" id="prodDesc" required class="admin-input" placeholder="cth: Potret ultra-realistik gaya jalanan...">
                        </div>

                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-wider mb-2 text-slate-400">Teks Prompt Lengkap</label>
                            <textarea id="prodPrompt" required rows="5" class="admin-input resize-none" placeholder="Make a Picture Ultrarealistic\nSUBJECT:...\nANGLE:..."></textarea>
                        </div>

                        <button type="submit" class="w-full py-5 bg-amber-500 text-black font-black text-[10px] tracking-[0.3em] uppercase rounded-2xl hover:bg-amber-400 transition-all shadow-lg shadow-amber-500/10">
                            Terbitkan Produk Baru
                        </button>
                    </form>
                </div>
            `;
            document.getElementById('modal-overlay').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        function addNewProduct(e) {
            e.preventDefault();
            
            const newId = products.length + 1;
            const newProduct = {
                id: newId,
                title: document.getElementById('prodTitle').value,
                category: document.getElementById('prodCategory').value.toUpperCase(),
                tag: document.getElementById('prodTag').value,
                image: document.getElementById('prodImage').value,
                promptText: document.getElementById('prodPrompt').value,
                description: document.getElementById('prodDesc').value
            };

            products.push(newProduct);
            
            closeModal();
            const loader = document.getElementById('loading-overlay');
            loader.style.display = 'flex';
            
            setTimeout(() => {
                loader.style.display = 'none';
                filterCategory('all');
                alert("Produk berjaya ditambah!");
            }, 1000);
        }

        function copyToClipboard(text, btn) {
            const decodedText = text.replace(/\\n/g, '\n');
            navigator.clipboard.writeText(decodedText);
            const oldText = btn.innerText;
            btn.innerText = 'Tersalin!';
            setTimeout(() => btn.innerText = oldText, 2000);
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.replace('flex', 'hidden');
            document.body.style.overflow = 'auto';
        }

        function resetSearch() {
            document.getElementById('search-input').value = '';
            filterCategory('all');
        }

        document.addEventListener('DOMContentLoaded', () => {
            filterCategory('all');
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
